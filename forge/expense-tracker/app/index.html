<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F9D8C">
<title>Expense Tracker — Fulcrum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shared/style-tokens.css">
<link rel="stylesheet" href="expense-tracker.css">
</head>
<body>

<div class="loading-bar hidden" id="loadingBar"></div>

<!-- Auth overlay -->
<div class="overlay" id="pinOverlay">
  <div class="pin-card">
    <div class="pin-eyebrow">forge · expense-tracker</div>
    <h2>Sign in</h2>
    <p>Enter your PIN and the 6-digit code from your authenticator app.</p>
    <div class="pin-field-label">PIN</div>
    <div class="pin-input-wrap">
      <input type="password" id="pinInput" inputmode="numeric" autocomplete="current-password" placeholder="••••••" maxlength="12">
    </div>
    <div class="pin-field-label">Authenticator code</div>
    <div class="pin-input-wrap">
      <input type="text" id="totpInput" inputmode="numeric" autocomplete="one-time-code" placeholder="000000" maxlength="6" pattern="[0-9]{6}">
    </div>
    <div class="pin-error" id="pinError"></div>
    <button class="btn btn-primary pin-submit" id="pinSubmit">Unlock</button>
  </div>
</div>

<!-- App shell -->
<div class="app-shell hidden" id="appShell">

  <!-- Sticky header -->
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-brand">
        <p class="eyebrow">forge · expense-tracker</p>
        <h1>Expense Tracker</h1>
      </div>
      <div class="header-controls">
        <div class="quote-currency-wrap">
          <label class="quote-label" for="quoteCurrencySelect">Base</label>
          <select id="quoteCurrencySelect" class="quote-select"></select>
        </div>
        <button class="theme-btn" id="themeToggle" aria-label="Toggle colour theme">☽</button>
      </div>
    </div>
    <!-- Date range bar (Dashboard only) -->
    <div class="date-range-bar" id="dateRangeBar">
      <button class="range-btn" data-range="this_month">This month</button>
      <button class="range-btn" data-range="last_month">Last month</button>
      <button class="range-btn" data-range="last_3">Last 3 mo</button>
      <button class="range-btn" data-range="last_6">Last 6 mo</button>
      <button class="range-btn" data-range="last_12">Last 12 mo</button>
      <button class="range-btn" data-range="ytd">Year to date</button>
      <button class="range-btn" data-range="all">All</button>
      <button class="range-btn" data-range="custom">Custom</button>
      <div class="custom-dates hidden" id="customDates">
        <input type="date" id="customFrom" title="From">
        <span style="color:var(--muted);font-size:12px">–</span>
        <input type="date" id="customTo" title="To">
      </div>
    </div>
    <nav class="tab-nav" id="tabNav">
      <button class="tab-btn" data-section="dashboard">Dashboard</button>
      <button class="tab-btn" data-section="transactions">Transactions</button>
      <button class="tab-btn" data-section="accounts">Accounts</button>
      <button class="tab-btn" data-section="categories">Categories</button>
      <button class="tab-btn" data-section="rates">Rates</button>
    </nav>
  </header>

  <!-- Banners -->
  <div class="notices-area">
    <div class="banner warn hidden" id="setupBanner">
      <span class="ico">!</span>
      <div>
        <strong>config.js not found.</strong> Copy <code>config.example.js</code> → <code>config.js</code>
        and fill in your Apps Script URL.
      </div>
    </div>
    <div class="banner hidden" id="msgBanner">
      <span class="ico" id="msgIco">›</span>
      <div id="msgText"></div>
    </div>
  </div>

  <!-- Main content -->
  <main class="app-main">

    <section class="app-section" id="dashboard">
      <div id="dashboardContent"></div>
    </section>

    <section class="app-section hidden" id="transactions">
      <div id="transactionsContent"></div>
    </section>

    <section class="app-section hidden" id="accounts">
      <div id="accountsContent"></div>
    </section>

    <section class="app-section hidden" id="categories">
      <div id="categoriesContent"></div>
    </section>

    <section class="app-section hidden" id="rates">
      <div id="ratesContent"></div>
    </section>

  </main>
</div>

<script src="../../_shared/sheets-client.js"></script>
<script src="config.js" onerror="window.__configMissing=true"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="expense-tracker.js"></script>
</body>
</html>
